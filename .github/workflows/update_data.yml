name: Update HUD Telemetry

on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch:      

concurrency:
  group: telemetry-sync
  cancel-in-progress: true

permissions:
  contents: write         

jobs:
  sync-telemetry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Riot Data
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
        run: node js/fetch_stats.js
        continue-on-error: true 

      - name: Fetch Prime Data
        run: node js/fetch_prime_stats.js

      - name: Commit and Push
        env:
          TZ: Europe/Berlin
        run: |
          git config --global user.name "HUD-Sync-Bot"
          git config --global user.email "bot@noreply.github.com"
          
          git add data.json prime_stats.json
          
          if [[ -n $(git status -s) ]]; then
            git commit -m "🤖 Telemetry Update: $(date +'%Y-%m-%d %H:%M')"
            git pull --rebase
            git push
          else
            echo "No changes detected in Riot or Prime data."
          fi
