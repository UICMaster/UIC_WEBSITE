name: Update Discord Events
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Run Sync Script
        env:
          # HIER FINDET DIE MAGIE STATT:
          # Das Script sucht nach "DISCORD_TOKEN", aber wir füttern es 
          # mit deinem Secret "EVENT_MANAGER_WEBSITE_TOKEN"
          DISCORD_TOKEN: ${{ secrets.EVENT_MANAGER_WEBSITE_TOKEN }}
          GUILD_ID: ${{ secrets.GUILD_ID }}
          
        # Da wir uns im Root befinden, rufen wir das Script im js-Ordner auf:
        run: node js/sync-events.js
        
      - name: Commit & Push changes
        run: |
          git config --global user.name 'UIC Bot'
          git config --global user.email 'bot@ultrainstinctcrew.com'
          git add data/events.json
          git commit -m "chore: auto-update discord events" || exit 0
          git push